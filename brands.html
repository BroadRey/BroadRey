<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./brands.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
    <title>Brands</title>
</head>
<body>
    <section class="technique-brands">
        <header class="technique-brands__header">
            <p class="technique-brands__text">Ремонт техники различных брендов</p>
        </header>
        <!-- Slider main container -->
        <div class="swiper-container brands-swiper-container">
            <!-- Additional required wrapper -->
            <div class="swiper-wrapper brands-swiper">
                <!-- Slides -->
                <div class="swiper-slide brands-swiper__slide">
                    <button class="brands-swiper__button"><img class="brands-swiper__img" lang="ru" src="./img/company-logo/lenovo-logo.png" alt="Логотип компании Lenovo"><img class="brands-swiper__button-icon" lang="ru" src="./img/company-logo/company-button.png" alt="Кнопка перехода по ссылке"></button>
                </div>
                <div class="swiper-slide brands-swiper__slide">
                    <button class="brands-swiper__button"><img class="brands-swiper__img" lang="ru" src="./img/company-logo/samsung-logo.png" alt="Логотип компании Samsung"><img class="brands-swiper__button-icon" lang="ru" src="./img/company-logo/company-button.png" alt="Кнопка перехода по ссылке"></button>
                </div>
                <div class="swiper-slide brands-swiper__slide">
                    <button class="brands-swiper__button"><img class="brands-swiper__img" lang="ru" src="./img/company-logo/apple-logo.png" alt="Логотип компании Apple"><img class="brands-swiper__button-icon" lang="ru" src="./img/company-logo/company-button.png" alt="Кнопка перехода по ссылке"></button>
                </div>
                <div class="swiper-slide brands-swiper__slide">
                    <button class="brands-swiper__button"><img class="brands-swiper__img" lang="ru" src="./img/company-logo/viewsonic-logo.png" alt="Логотип компании VIEWSONIC"><img class="brands-swiper__button-icon" lang="ru" src="./img/company-logo/company-button.png" alt="Кнопка перехода по ссылке"></button>
                </div>
                <div class="swiper-slide brands-swiper__slide">
                    <button class="brands-swiper__button"><img class="brands-swiper__img" lang="ru" src="./img/company-logo/bosch-logo.png" alt="Логотип компании BOSCH"><img class="brands-swiper__button-icon" lang="ru" src="./img/company-logo/company-button.png" alt="Кнопка перехода по ссылке"></button>
                </div>
                <div class="swiper-slide brands-swiper__slide">
                    <button class="brands-swiper__button"><img class="brands-swiper__img" lang="ru" src="./img/company-logo/hp-logo.png" alt="Логотип компании HP"><img class="brands-swiper__button-icon" lang="ru" src="./img/company-logo/company-button.png" alt="Кнопка перехода по ссылке"></button>
                </div>
                <div class="swiper-slide brands-swiper__slide">
                    <button class="brands-swiper__button"><img class="brands-swiper__img" lang="ru" src="./img/company-logo/acer-logo.png" alt="Логотип компании Acer"><img class="brands-swiper__button-icon" lang="ru" src="./img/company-logo/company-button.png" alt="Кнопка перехода по ссылке"></button>
                </div>
                <div class="swiper-slide brands-swiper__slide">
                    <button class="brands-swiper__button"><img class="brands-swiper__img" lang="ru" src="./img/company-logo/sony-logo.png" alt="Логотип компании Sony"><img class="brands-swiper__button-icon" lang="ru" src="./img/company-logo/company-button.png" alt="Кнопка перехода по ссылке"></button>
                </div>
                <div class="swiper-slide brands-swiper__slide">
                    <button class="brands-swiper__button"><img class="brands-swiper__img" lang="ru" src="./img/company-logo/lenovo-logo.png" alt="Логотип компании Lenovo"><img class="brands-swiper__button-icon" lang="ru" src="./img/company-logo/company-button.png" alt="Кнопка перехода по ссылке"></button>
                </div>
            </div>
            <!-- If we need pagination -->
            <div class="swiper-pagination brands-swiper-pagination"></div>
        </div>
    </section>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="./brands.js"></script>
</body>
</html>
